project:
  name: universal-agentic-data-pipeline-fitness-demo
  root_dir: .

request:
  topic: fitness supplements
  modality: text
  task_type: classification
  domain: supplements
  sources_preference:
    - dataset
    - api
    - github_repo
    - scrape
  label_schema:
    sentiment:
      - positive
      - neutral
      - negative
    effect:
      - energy
      - side_effects
      - other

source:
  use_huggingface: true
  use_public_api: false
  use_internal_api: false
  use_github_search: false
  use_scraping_fallback: false
  max_sources: 3

annotation:
  use_llm: true
  llm_provider: mock
  confidence_threshold: 0.6
  effect_labels:
    - energy
    - side_effects
    - other
